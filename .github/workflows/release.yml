name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get version from tag
        id: package_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build for All Platforms
        run: bun run build:all
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: v${{ steps.package_version.outputs.version }}

      - name: Archive artifacts with version
        run: |
          ls dist
          VERSION=${{ steps.package_version.outputs.version }}
          chmod +r dist/*
          cd dist
          tar -czf ../FGateNexus-v${VERSION}-linux-x64.tar.gz FGateNexus-linux-x64
          tar -czf ../FGateNexus-v${VERSION}-linux-arm64.tar.gz FGateNexus-linux-arm64
          tar -czf ../FGateNexus-v${VERSION}-mac-x64.tar.gz FGateNexus-mac-x64
          tar -czf ../FGateNexus-v${VERSION}-mac-arm64.tar.gz FGateNexus-mac-arm64
          zip -r ../FGateNexus-v${VERSION}-win.zip FGateNexus-win-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            FGateNexus-v${{ steps.package_version.outputs.version }}-linux-x64.tar.gz
            FGateNexus-v${{ steps.package_version.outputs.version }}-linux-arm64.tar.gz
            FGateNexus-v${{ steps.package_version.outputs.version }}-mac-x64.tar.gz
            FGateNexus-v${{ steps.package_version.outputs.version }}-mac-arm64.tar.gz
            FGateNexus-v${{ steps.package_version.outputs.version }}-win.zip

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: wlingxd/fgatenexus
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Get version from tag
        id: package_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            SENTRY_URL=${{ secrets.SENTRY_URL }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_RELEASE=v${{ steps.package_version.outputs.version }}
          cache-from: |
            type=registry,ref=wlingxd/fgatenexus:buildcache-amd64
            type=registry,ref=wlingxd/fgatenexus:buildcache-arm64
          cache-to: type=registry,ref=wlingxd/fgatenexus:buildcache-${{ runner.arch }},mode=max

  release:
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: package_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package_version.outputs.version }}
          name: v${{ steps.package_version.outputs.version }}
          draft: true
          generate_release_notes: false
          prerelease: false
          files: |
            FGateNexus-v${{ steps.package_version.outputs.version }}-linux-x64.tar.gz
            FGateNexus-v${{ steps.package_version.outputs.version }}-linux-arm64.tar.gz
            FGateNexus-v${{ steps.package_version.outputs.version }}-mac-x64.tar.gz
            FGateNexus-v${{ steps.package_version.outputs.version }}-mac-arm64.tar.gz
            FGateNexus-v${{ steps.package_version.outputs.version }}-win.zip
          body: |
            ## 📦 下载说明

            | 平台 | 架构 | 文件名 |
            |------|------|--------|
            | Linux | x64 | `FGateNexus-v${{ steps.package_version.outputs.version }}-linux-x64.tar.gz` |
            | Linux | ARM64 | `FGateNexus-v${{ steps.package_version.outputs.version }}-linux-arm64.tar.gz` |
            | macOS | x64 | `FGateNexus-v${{ steps.package_version.outputs.version }}-mac-x64.tar.gz` |
            | macOS | ARM64 | `FGateNexus-v${{ steps.package_version.outputs.version }}-mac-arm64.tar.gz` |
            | Windows | x64 | `FGateNexus-v${{ steps.package_version.outputs.version }}-win.zip` |

            ## What's Changed

            ${{ steps.git_cliff.outputs.content }}
