name: Publish template-sdk

on:
  push:
    branches: [main]
    paths:
      - "packages/template-sdk/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check if version changed
        id: version_check
        run: |
          PKG_VERSION=$(jq -r .version packages/template-sdk/package.json)
          PUBLISHED_VERSION=$(npm view @fgate/template-sdk version 2>/dev/null || echo "0.0.0")
          echo "pkg_version=${PKG_VERSION}"
          echo "published_version=${PUBLISHED_VERSION}"
          if [ "$PKG_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.version_check.outputs.changed == 'true'
        run: bun run --cwd packages/template-sdk build

      - name: Publish to npm
        if: steps.version_check.outputs.changed == 'true'
        working-directory: packages/template-sdk
        run: |
          sudo npm install -g npm@latest
          npm publish --access public
